apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-config
  labels:
    app: ecommerce-api
    component: config
data:
  ENV: "prod"

  # Logging
  LOG_LEVEL: "INFO"
  ENABLE_FILE_LOGS: "false"

  # Core services
  REDIS_URL: "redis://redis:6379"
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_MODE: "server"
  QDRANT_COLLECTION_NAME: "review_embeddings"

  # API / UI ports
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  STREAMLIT_PORT: "8501"

  # Observability
  OTEL_SERVICE_NAME: "multi-agent-ecommerce-analyst"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_TRACES_EXPORTER_MODE: "console"

  # Metrics + rate limiting
  METRICS_PORT: "9000"
  RATE_LIMIT_PER_MINUTE: "100"
