permissions:
  contents: read
  packages: write

name: CI-CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Python setup
      # -----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------
      # Lint / sanity check
      # -----------------------------
      - name: Lint import sanity
        run: python -m compileall app

      # -----------------------------
      # Docker buildx setup
      # -----------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------
      # Login to GHCR (or Docker Hub)
      # -----------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------
      # Build API image
      # -----------------------------
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecommerce-analyst-api:v14
            ghcr.io/${{ github.repository_owner }}/ecommerce-analyst-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------
      # Build Streamlit UI image
      # -----------------------------
      - name: Build Streamlit UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.streamlit
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecommerce-analyst-ui:v5
            ghcr.io/${{ github.repository_owner }}/ecommerce-analyst-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
