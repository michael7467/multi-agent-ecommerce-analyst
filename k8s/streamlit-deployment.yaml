apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-streamlit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecommerce-streamlit
  template:
    metadata:
      labels:
        app: ecommerce-streamlit
    spec:
      securityContext:
        fsGroup: 1000

      containers:
        - name: streamlit
          image: ghcr.io/YOUR_USERNAME/multi-agent-ecommerce-analyst-streamlit:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501

          envFrom:
            - configMapRef:
                name: ecommerce-config
            - secretRef:
                name: ecommerce-secrets

          # Override only what differs from config
          env:
            - name: REDIS_URL
              value: redis://redis-service:6379/0

          startupProbe:
            tcpSocket:
              port: 8501
            failureThreshold: 30
            periodSeconds: 10

          readinessProbe:
            tcpSocket:
              port: 8501
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            tcpSocket:
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

      restartPolicy: Always
