name: CI-CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint import sanity
        run: |
          python -m compileall app

      - name: Build FastAPI image
        run: docker build -f Dockerfile.api -t ecommerce-analyst-api .

      - name: Build Streamlit image
        run: docker build -f Dockerfile.streamlit -t ecommerce-analyst-ui .