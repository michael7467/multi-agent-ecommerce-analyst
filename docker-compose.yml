version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      OTEL_SERVICE_NAME: multi-agent-ecommerce-analyst-api
    depends_on:
      - redis

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      REDIS_URL: redis://redis:6379/0
      OTEL_SERVICE_NAME: multi-agent-ecommerce-analyst-ui
    depends_on:
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"